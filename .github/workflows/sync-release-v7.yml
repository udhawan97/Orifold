name: Sync release-v7

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: sync-release-v7
  cancel-in-progress: false

jobs:
  sync:
    name: Move release-v7 to main when main advances
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tags
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Sync release-v7 tag
        id: sync
        env:
          RELEASE_TAG: release-v7
        run: |
          set -euo pipefail

          git fetch origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/tags/*:refs/tags/* \
            --force

          main_sha="$(git rev-parse origin/main)"
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            tag_sha="$(git rev-parse "$RELEASE_TAG")"
          else
            tag_sha=""
          fi

          echo "main_sha=$main_sha" >> "$GITHUB_OUTPUT"
          echo "tag_sha=$tag_sha" >> "$GITHUB_OUTPUT"

          if [[ "$tag_sha" == "$main_sha" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "$RELEASE_TAG already points at origin/main ($main_sha)."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$RELEASE_TAG" "$main_sha"
          git push --force origin "refs/tags/$RELEASE_TAG"

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_TAG moved from ${tag_sha:-<missing>} to $main_sha."

      - name: Rebuild latest v7 release
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release.yml \
            --ref main \
            -f release_tag=release-v7
