<svg viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="Orifold: 50 messy files go into the Orifold app and come out as one polished, searchable, password-protected PDF — up to 50 files per workspace, 0 files ever uploaded, 12+ PDF tools in one app, $0 forever">
  <defs>
    <linearGradient id="gradMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="gradApp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2DA9F7"/>
      <stop offset="1" stop-color="#7C5CFB"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- ======== left: messy file pile (centered at x=175) ======== -->
  <g>
    <g transform="translate(55,55) rotate(-12 50 65)">
      <rect width="100" height="130" rx="8" fill="#161b22" stroke="#30363d"/>
      <path d="M78 1 L99 22 L78 22 Z" fill="#30363d" opacity="0.7"/>
      <rect x="12" y="34" width="62" height="5" rx="2.5" fill="#30363d"/>
      <rect x="12" y="46" width="74" height="5" rx="2.5" fill="#30363d"/>
      <rect x="12" y="58" width="50" height="5" rx="2.5" fill="#30363d"/>
      <text x="50" y="114" text-anchor="middle" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#8b949e">scan_0042.jpg</text>
    </g>
    <g transform="translate(195,50) rotate(10 50 65)">
      <rect width="100" height="130" rx="8" fill="#161b22" stroke="#30363d"/>
      <path d="M78 1 L99 22 L78 22 Z" fill="#30363d" opacity="0.7"/>
      <rect x="12" y="34" width="76" height="42" rx="4" fill="#30363d" opacity="0.7"/>
      <circle cx="26" cy="46" r="5" fill="#8b949e" opacity="0.7"/>
      <path d="M16 70 L38 52 L54 66 L68 56 L88 72" stroke="#8b949e" stroke-width="2" fill="none" opacity="0.7"/>
      <text x="50" y="114" text-anchor="middle" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#8b949e">IMG_2941.png</text>
    </g>
    <g transform="translate(80,85) rotate(-5 50 65)">
      <rect width="100" height="130" rx="8" fill="#161b22" stroke="#30363d"/>
      <path d="M78 1 L99 22 L78 22 Z" fill="#30363d" opacity="0.7"/>
      <rect x="12" y="34" width="70" height="5" rx="2.5" fill="#30363d"/>
      <rect x="12" y="46" width="58" height="5" rx="2.5" fill="#30363d"/>
      <rect x="12" y="58" width="76" height="5" rx="2.5" fill="#30363d"/>
      <text x="50" y="114" text-anchor="middle" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#8b949e">notes.docx</text>
    </g>
    <g transform="translate(170,90) rotate(6 50 65)">
      <rect width="100" height="130" rx="8" fill="#161b22" stroke="#30363d"/>
      <path d="M78 1 L99 22 L78 22 Z" fill="#30363d" opacity="0.7"/>
      <rect x="12" y="34" width="66" height="5" rx="2.5" fill="#30363d"/>
      <rect x="12" y="46" width="76" height="5" rx="2.5" fill="#30363d"/>
      <rect x="12" y="58" width="44" height="5" rx="2.5" fill="#30363d"/>
      <text x="50" y="114" text-anchor="middle" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#8b949e">report_v2.md</text>
    </g>
    <g transform="translate(125,68) rotate(1 50 65)">
      <rect width="100" height="130" rx="8" fill="#161b22" stroke="#3B82F6" stroke-opacity="0.75"/>
      <path d="M78 1 L99 22 L78 22 Z" fill="#30363d"/>
      <rect x="12" y="34" width="72" height="5" rx="2.5" fill="#30363d"/>
      <rect x="12" y="46" width="60" height="5" rx="2.5" fill="#30363d"/>
      <rect x="12" y="58" width="76" height="5" rx="2.5" fill="#30363d"/>
      <rect x="12" y="70" width="52" height="5" rx="2.5" fill="#30363d"/>
      <text x="50" y="114" text-anchor="middle" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#e6edf3">final_ACTUAL.pdf</text>
    </g>
  </g>

  <!-- ======== connectors into the app ======== -->
  <path d="M312 120 C360 116 412 138 452 146" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4 5" fill="none" opacity="0.6"/>
  <path d="M312 192 C360 194 412 162 452 154" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4 5" fill="none" opacity="0.6"/>

  <!-- ======== center: the Orifold app icon (x=500) ======== -->
  <ellipse cx="500" cy="150" rx="66" ry="66" fill="url(#gradMark)" opacity="0.28" filter="url(#glow)"/>
  <g transform="translate(452,102)">
    <rect width="96" height="96" rx="22" fill="url(#gradApp)"/>
    <rect width="96" height="96" rx="22" fill="#ffffff" opacity="0.06"/>
    <!-- folded sheet -->
    <path d="M30 28 a3 3 0 0 1 3 -3 H56 L70 39 V65 a3 3 0 0 1 -3 3 H33 a3 3 0 0 1 -3 -3 Z" fill="#ffffff"/>
    <path d="M56 25 L70 39 H59 a3 3 0 0 1 -3 -3 Z" fill="#C7D2FE"/>
    <rect x="37" y="47" width="26" height="3.4" rx="1.7" fill="#8B5CF6" opacity="0.45"/>
    <rect x="37" y="55" width="19" height="3.4" rx="1.7" fill="#8B5CF6" opacity="0.45"/>
  </g>
  <text x="500" y="86" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.12em" fill="url(#gradMark)">ORIFOLD</text>

  <!-- capability pills (centered at x=500) -->
  <g font-size="11" text-anchor="middle">
    <rect x="355" y="215" width="48" height="22" rx="11" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-opacity="0.35"/>
    <text x="379" y="230" fill="#3B82F6">merge</text>
    <rect x="411" y="215" width="40" height="22" rx="11" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-opacity="0.35"/>
    <text x="431" y="230" fill="#3B82F6">OCR</text>
    <rect x="459" y="215" width="42" height="22" rx="11" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-opacity="0.35"/>
    <text x="480" y="230" fill="#3B82F6">sign</text>
    <rect x="509" y="215" width="68" height="22" rx="11" fill="#8B5CF6" fill-opacity="0.1" stroke="#8B5CF6" stroke-opacity="0.35"/>
    <text x="543" y="230" fill="#8B5CF6">compress</text>
    <rect x="585" y="215" width="60" height="22" rx="11" fill="#8B5CF6" fill-opacity="0.1" stroke="#8B5CF6" stroke-opacity="0.35"/>
    <text x="615" y="230" fill="#8B5CF6">encrypt</text>
  </g>

  <!-- arrow out -->
  <line x1="548" y1="150" x2="716" y2="150" stroke="url(#gradMark)" stroke-width="2.5"/>
  <polygon points="730,150 716,143 716,157" fill="#8B5CF6"/>

  <!-- ======== right: the one polished PDF (centered at x=825) ======== -->
  <g transform="translate(732,45)">
    <rect width="185" height="210" rx="12" fill="#161b22" stroke="url(#gradMark)" stroke-width="2"/>
    <rect x="16" y="16" width="44" height="20" rx="6" fill="#EF4444" opacity="0.9"/>
    <text x="38" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">PDF</text>
    <rect x="70" y="18" width="80" height="6" rx="3" fill="#e6edf3" opacity="0.8"/>
    <rect x="70" y="30" width="56" height="5" rx="2.5" fill="#30363d"/>
    <line x1="16" y1="52" x2="169" y2="52" stroke="#30363d"/>

    <circle cx="28" cy="76" r="6" stroke="#10B981" stroke-width="2" fill="none"/>
    <line x1="32.5" y1="80.5" x2="38" y2="86" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
    <text x="50" y="80" font-size="11.5" fill="#e6edf3">Searchable — OCR’d</text>

    <path d="M24 108 v-5 a4 4 0 0 1 8 0 v5" stroke="#10B981" stroke-width="2" fill="none"/>
    <rect x="20" y="108" width="16" height="12" rx="2.5" fill="#10B981"/>
    <text x="50" y="118" font-size="11.5" fill="#e6edf3">Password-protected</text>

    <circle cx="28" cy="150" r="8" fill="#10B981" fill-opacity="0.15" stroke="#10B981"/>
    <polyline points="24,150 27,153 33,146" stroke="#10B981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="50" y="154" font-size="11.5" fill="#e6edf3">One clean file</text>

    <text x="92" y="190" text-anchor="middle" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#8b949e">actually-final.pdf</text>
  </g>

  <!-- ======== captions ======== -->
  <text x="175" y="278" text-anchor="middle" font-size="13" fill="#8b949e"><tspan font-weight="700" fill="#3B82F6">50</tspan> messy files in</text>
  <text x="500" y="278" text-anchor="middle" font-size="11" font-style="italic" fill="#8b949e">nothing leaves your Mac</text>
  <text x="825" y="278" text-anchor="middle" font-size="13" fill="#8b949e"><tspan font-weight="700" fill="#8B5CF6">1</tspan> polished PDF out</text>

  <!-- ======== stat strip ======== -->
  <line x1="90" y1="300" x2="910" y2="300" stroke="#30363d"/>
  <g text-anchor="middle">
    <text x="170" y="328" font-size="20" font-weight="700" fill="url(#gradMark)">50</text>
    <text x="170" y="345" font-size="11" fill="#8b949e">files per workspace</text>
    <text x="390" y="328" font-size="20" font-weight="700" fill="url(#gradMark)">0</text>
    <text x="390" y="345" font-size="11" fill="#8b949e">files ever uploaded</text>
    <text x="610" y="328" font-size="20" font-weight="700" fill="url(#gradMark)">12+</text>
    <text x="610" y="345" font-size="11" fill="#8b949e">PDF tools, one app</text>
    <text x="830" y="328" font-size="20" font-weight="700" fill="url(#gradMark)">$0</text>
    <text x="830" y="345" font-size="11" fill="#8b949e">forever</text>
  </g>
</svg>
